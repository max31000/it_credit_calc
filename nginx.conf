server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Gzip — сжимаем здесь, в контейнере, чтобы Content-Length был известен
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_static on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # SPA: все запросы к /credit_calc/* отдают index.html если файл не найден
    location /credit_calc/ {
        try_files $uri $uri/ /credit_calc/index.html;
    }

    # JS/CSS/статика — кэш без immutable (immutable провоцировал Range-запросы)
    location ~* ^/credit_calc/assets/.*\.(js|css)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Прочие статические ресурсы
    location ~* ^/credit_calc/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Редирект /credit_calc без слэша
    location = /credit_calc {
        return 301 /credit_calc/;
    }
}
