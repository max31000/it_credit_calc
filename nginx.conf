server {
    listen 80;
    server_name _;

    # Статические файлы калькулятора
    location /credit_calc {
        alias /usr/share/nginx/html/credit_calc;
        # SPA: все пути отдают index.html
        try_files $uri $uri/ /credit_calc/index.html;
        # Кэш для статики
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Редирект / -> /credit_calc для удобства
    location = / {
        return 301 /credit_calc;
    }
}
