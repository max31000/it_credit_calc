server {
    listen 80;
    server_name _;

    # root указывает на директорию, содержащую папку credit_calc
    root /usr/share/nginx/html;

    # Отключить sendfile — решает проблему с 206 Partial Content через proxy
    sendfile off;

    # SPA: все запросы к /credit_calc/* отдают index.html если файл не найден
    location /credit_calc/ {
        try_files $uri $uri/ /credit_calc/index.html;
    }

    # JS/CSS/статика — без агрессивного кэша (убрали immutable, который провоцировал Range-запросы)
    location ~* ^/credit_calc/assets/.*\.(js|css)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        add_header Vary Accept-Encoding;
    }

    # Прочие статические ресурсы (иконки, шрифты)
    location ~* ^/credit_calc/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Редирект /credit_calc без слэша
    location = /credit_calc {
        return 301 /credit_calc/;
    }
}
