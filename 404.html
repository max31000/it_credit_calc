<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Ипотечный стратег</title>
    <script>
      // GitHub Pages SPA trick: сохраняем путь и редиректим на index.html
      sessionStorage.redirect = location.href;
      location.replace(
        location.pathname.split('/').slice(0, 2).join('/') + '/?p=' +
        location.pathname.slice(1) + location.search + location.hash
      );
    </script>
  </head>
  <body></body>
</html>
